    .modal-box { max-width: calc(100vw - 24px) !important; padding: 20px !important; max-height: 85vh !important; }
    h1 { font-size: 18px !important; }
    table { min-width: 600px; }
  }
  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: 1fr !important; }
    .pipeline-grid { grid-template-columns: repeat(2,1fr) !important; }
  }
</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SEED = {
  customers: [

    { id:"c2", code:"SKYJET", name:"SkyJet International", contact:"Maria Gonzalez", email:"mgonzalez@skyjet.com", phone:"(786) 555-0202", billing:"8000 NW 21st St, Doral, FL 33122", terms:"Prepay", status:"Active", notes:"Requires prepayment." },
    { id:"c3", code:"HELIX", name:"Helix Rotorcraft", contact:"David Park", email:"dpark@helixrotor.com", phone:"(954) 555-0303", billing:"1900 SW 4th Ave, Ft Lauderdale, FL 33315", terms:"Net 45", status:"Active", notes:"" },
  ],
  vendors: [
    { id:"v1", code:"AERO-S", name:"AeroSource Inc.", contact:"Linda Park", email:"sales@aerosource.com", phone:"(305) 555-1010", notes:"" },
    { id:"v2", code:"GLOBAV", name:"Global Aviation Parts", contact:"Tom Ryan", email:"tryan@globav.com", phone:"(954) 555-2020", notes:"Overseas sourcing" },
    { id:"v3", code:"PRECAV", name:"Precision Aero Supply", contact:"Sarah Klein", email:"s.klein@precav.net", phone:"(786) 555-3030", notes:"Preferred — fastest turnaround" },
  ],
  parts: [
    { id:"p1", pn:"HTR-204-7A", desc:"Hydraulic Pressure Regulator Valve", category:"Hydraulics", uom:"EA", notes:"" },
    { id:"p2", pn:"ACT-5512", desc:"Landing Gear Actuator", category:"Landing Gear", uom:"EA", notes:"Long lead time" },
    { id:"p3", pn:"FLC-301B", desc:"Fuel Line Coupling", category:"Fuel System", uom:"EA", notes:"" },
  ],
  vendorQuotes: [

    { id:"vq2", partId:"p1", vendorId:"v3", cost:1180, leadDays:5, quoteDate:"2026-04-02", expires:"2026-06-02", qty:1, notes:"Volume discount at 5+", source:"Phone call" },
    { id:"vq3", partId:"p2", vendorId:"v2", cost:8500, leadDays:21, quoteDate:"2026-03-20", expires:"2026-05-20", qty:1, notes:"Overseas shipping included", source:"Email quote" },
    { id:"vq4", partId:"p3", vendorId:"v3", cost:320, leadDays:5, quoteDate:"2026-04-12", expires:"2026-06-12", qty:1, notes:"Preferred vendor pricing", source:"Email quote" },
  ],
  customerPricing: [
    { id:"cp1", partId:"p1", customerId:"c1", sellPrice:2100, notes:"Contract rate 2024" },
    { id:"cp2", partId:"p1", customerId:"c2", sellPrice:2450, notes:"" },
    { id:"cp3", partId:"p2", customerId:"c1", sellPrice:14500, notes:"" },
    { id:"cp4", partId:"p3", customerId:"c3", sellPrice:595, notes:"" },
  ],
  orders: [
    { id:"o1", orderNum:"OPS-2026-0001", customerId:"c1", partId:"p1", qty:2, unitPrice:2100, vendorId:"v3", vendorCost:1180, repairCost:150, status:"Awaiting Vendor", priority:"Normal", custPO:"PO-ATLAS-88421", dateQuoted:"2026-04-10", datePO:"2026-04-12", dateVendor:"2026-04-13", dateShip:"2026-04-22", notes:"Customer needs by end of month." },
    { id:"o2", orderNum:"OPS-2026-0002", customerId:"c2", partId:"p2", qty:1, unitPrice:14500, vendorId:"v2", vendorCost:8500, repairCost:800, status:"Proforma Sent", priority:"High", custPO:"PO-SKY-2026-041", dateQuoted:"2026-04-05", datePO:"2026-04-08", dateVendor:"", dateShip:"", notes:"Awaiting prepayment." },
    { id:"o3", orderNum:"OPS-2026-0003", customerId:"c3", partId:"p3", qty:5, unitPrice:595, vendorId:"", vendorCost:0, repairCost:0, status:"Quoted", priority:"Normal", custPO:"", dateQuoted:"2026-04-18", datePO:"", dateVendor:"", dateShip:"", notes:"Awaiting customer decision." },
  ],
  orderEvents: [
    { id:"e1", orderId:"o1", ts:"2026-04-10T09:15:00", type:"Quote Sent", author:"You", note:"Initial quote to Robert at Atlas." },
    { id:"e2", orderId:"o1", ts:"2026-04-12T14:30:00", type:"PO Received", author:"You", note:"PO #PO-ATLAS-88421 received." },
    { id:"e3", orderId:"o2", ts:"2026-04-09T15:20:00", type:"Proforma Sent", author:"You", note:"Proforma invoice sent — $15,300 total." },
  ],
};

const LS = {
  get: (k, seed) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : seed; } catch { return seed; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

const ORDER_STATUSES = ["Quoted","PO Received","Sourcing","Awaiting Vendor","In Repair","Proforma Sent","Prepaid","Shipped","Invoiced","Closed","Cancelled"];
const STATUS_COLORS = { "Quoted":"#f59e0b","PO Received":"#8b5cf6","Sourcing":"#06b6d4","Awaiting Vendor":"#3b82f6","In Repair":"#ec4899","Proforma Sent":"#eab308","Prepaid":"#14b8a6","Shipped":"#10b981","Invoiced":"#22c55e","Closed":"#6b7280","Cancelled":"#ef4444" };
const PRIORITIES = ["Low","Normal","High","Urgent"];
const PRIORITY_COLORS = { Low:"#6b7280", Normal:"#3b82f6", High:"#f59e0b", Urgent:"#ef4444" };
const CUST_STATUS = ["Active","Inactive","Prospect"];
const CUST_COLORS = { Active:"#10b981", Inactive:"#6b7280", Prospect:"#f59e0b" };
const TERMS = ["Prepay","Net 15","Net 30","Net 45","Net 60","COD"];
const CATEGORIES = ["Hydraulics","Landing Gear","Fuel System","Avionics","Engine","Airframe","Electrical","Other"];
const EVENT_TYPES = ["Quote Sent","PO Received","Vendor Quote","Vendor Ordered","Part Received","Repair Started","Repair Complete","Proforma Sent","Payment Received","Shipped","Invoiced","Note","Status Change"];
const QUOTE_SOURCES = ["Email quote","Phone call","Website","Catalog","Portal","Other"];

const fmt$ = n => "$" + Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = d => d ? new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
const fmtTs = ts => new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
const today = () => new Date().toISOString().slice(0,10);
const isExpired = exp => exp && new Date(exp) < new Date();
let _id = 500; const uid = () => "x" + (_id++);
const nextOrderNum = (orders) => {
  const y = new Date().getFullYear();
  const nums = orders.filter(o => o.orderNum && o.orderNum.startsWith("OPS-"+y+"-")).map(o => parseInt(o.orderNum.split("-")[2])||0);
  const n = (nums.length ? Math.max.apply(null,nums) : 0) + 1;
  return "OPS-" + y + "-" + String(n).padStart(4,"0");
};

const S = {
  root: {fontFamily:"'DM Mono','Courier New',monospace",background:"#0d1117",minHeight:"100vh",color:"#e2e8f0",display:"flex"},
  sidebar: {width:220,background:"#010409",borderRight:"1px solid #21262d",padding:"16px 0",position:"fixed",height:"100vh",overflowY:"auto",zIndex:40},
  main: {flex:1,marginLeft:220,minHeight:"100vh"},
  body: {padding:"24px 28px",maxWidth:1400,margin:"0 auto"},
  card: {background:"#161b22",border:"1px solid #21262d",borderRadius:8,padding:20,marginBottom:14},
  lbl: {color:"#8b949e",fontSize:10,letterSpacing:.8,textTransform:"uppercase",marginBottom:4,fontWeight:600},
  btn: (bg,c,b) => ({background:bg||"#21262d",border:b||"1px solid #30363d",borderRadius:6,color:c||"#c9d1d9",padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6}),
  btnP: {background:"#1f6feb",border:"none",borderRadius:6,color:"#fff",padding:"8px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700,display:"inline-flex",alignItems:"center",gap:6},
  btnD: {background:"#da363322",border:"1px solid #da363344",borderRadius:6,color:"#f85149",padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6},
  ico: c => ({background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:4,display:"inline-flex",alignItems:"center",color:c}),
  inp: {background:"#0d1117",border:"1px solid #30363d",borderRadius:6,color:"#e2e8f0",padding:"8px 12px",fontSize:12,fontFamily:"inherit",width:"100%",outline:"none"},
  sel: {background:"#0d1117",border:"1px solid #30363d",borderRadius:6,color:"#e2e8f0",padding:"8px 12px",fontSize:12,fontFamily:"inherit",width:"100%",outline:"none"},
  overlay: {position:"fixed",inset:0,background:"#000000cc",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20},
  modal: {background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:24,width:"100%",maxWidth:540,maxHeight:"90vh",overflowY:"auto"},
  th: {color:"#8b949e",fontSize:10,letterSpacing:.8,textTransform:"uppercase",padding:"9px 12px",textAlign:"left",borderBottom:"1px solid #21262d",fontWeight:700},
  td: {padding:"10px 12px",fontSize:12,borderBottom:"1px solid #1a2030",verticalAlign:"middle"},
  chip: (a,c) => ({padding:"4px 12px",cursor:"pointer",fontSize:11,fontWeight:700,background:a?(c||"#1f6feb"):"#21262d",border:"1px solid "+(a?(c||"#1f6feb"):"#30363d"),borderRadius:20,color:a?"#fff":"#8b949e",fontFamily:"inherit"}),
  navItem: (a) => ({display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",fontSize:13,fontWeight:600,color:a?"#58a6ff":"#8b949e",background:a?"#161b22":"transparent",borderLeft:a?"3px solid #58a6ff":"3px solid transparent"}),
};

const Badge = ({label,colors}) => { const c = colors[label]||"#6b7280"; return <span style={{background:c+"22",color:c,border:"1px solid "+c+"44",borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:.5,whiteSpace:"nowrap"}}>{label}</span>; };
const FF = ({label,children,half}) => <div style={{marginBottom:12,width:half?"calc(50% - 6px)":"100%"}}><div style={S.lbl}>{label}</div>{children}</div>;
const Row = ({children}) => <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{children}</div>;

function App() {
  const [customers, setCustomers] = useState(() => LS.get("op_cus", SEED.customers));
  const [vendors, setVendors] = useState(() => LS.get("op_ven", SEED.vendors));
  const [parts, setParts] = useState(() => LS.get("op_prt", SEED.parts));
  const [vendorQuotes, setVendorQuotes] = useState(() => LS.get("op_vq", SEED.vendorQuotes));
  const [customerPricing, setCustomerPricing] = useState(() => LS.get("op_cp", SEED.customerPricing));
  const [orders, setOrders] = useState(() => LS.get("op_ord", SEED.orders));
  const [orderEvents, setOrderEvents] = useState(() => LS.get("op_ev", SEED.orderEvents));

  useEffect(() => LS.set("op_cus", customers), [customers]);
  useEffect(() => LS.set("op_ven", vendors), [vendors]);
  useEffect(() => LS.set("op_prt", parts), [parts]);
  useEffect(() => LS.set("op_vq", vendorQuotes), [vendorQuotes]);
  useEffect(() => LS.set("op_cp", customerPricing), [customerPricing]);
  useEffect(() => LS.set("op_ord", orders), [orders]);
  useEffect(() => LS.set("op_ev", orderEvents), [orderEvents]);

  const [view, setView] = useState("dashboard");
  const [selId, setSelId] = useState(null);
  const [modal, setModal] = useState(null);
  const [editId, setEditId] = useState(null);
  const [delTarget, setDelTarget] = useState(null);
  const [toast, setToast] = useState(null);
  const [mobileNav, setMobileNav] = useState(false);
  const [orderSearch, setOrderSearch] = useState("");
  const [orderStatusFilter, setOrderStatusFilter] = useState("All");
  const [partSearch, setPartSearch] = useState("");
  const [custSearch, setCustSearch] = useState("");
  const [venSearch, setVenSearch] = useState("");

  const [custForm, setCustForm] = useState({});
  const [venForm, setVenForm] = useState({});
  const [partForm, setPartForm] = useState({});
  const [vqForm, setVqForm] = useState({});
  const [cpForm, setCpForm] = useState({});
  const [ordForm, setOrdForm] = useState({});
  const [evtForm, setEvtForm] = useState({});

  const showToast = (msg, type) => { setToast({msg,type:type||"ok"}); setTimeout(()=>setToast(null), 2600); };
  const getCust = id => customers.find(c=>c.id===id);
  const getVen = id => vendors.find(v=>v.id===id);
  const getPart = id => parts.find(p=>p.id===id);
  const vqForPart = pid => vendorQuotes.filter(q=>q.partId===pid).sort((a,b)=>a.cost-b.cost);
  const cpForPart = pid => customerPricing.filter(c=>c.partId===pid);
  const eventsForOrder = oid => orderEvents.filter(e=>e.orderId===oid).sort((a,b)=>new Date(b.ts)-new Date(a.ts));

  const saveCust = () => {
    if (!custForm.name || !custForm.name.trim() || !custForm.code || !custForm.code.trim()) return showToast("Code and Name required","err");
    const d = Object.assign({}, custForm, {code: custForm.code.toUpperCase()});
    if (modal==="editCust") setCustomers(customers.map(c=>c.id===editId?Object.assign({},d,{id:editId}):c));
    else setCustomers(customers.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveVen = () => {
    if (!venForm.name || !venForm.name.trim() || !venForm.code || !venForm.code.trim()) return showToast("Code and Name required","err");
    const d = Object.assign({}, venForm, {code: venForm.code.toUpperCase()});
    if (modal==="editVen") setVendors(vendors.map(v=>v.id===editId?Object.assign({},d,{id:editId}):v));
    else setVendors(vendors.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const savePart = () => {
    if (!partForm.pn || !partForm.pn.trim()) return showToast("Part number required","err");
    const d = Object.assign({}, partForm, {pn: partForm.pn.toUpperCase()});
    if (modal==="editPart") setParts(parts.map(p=>p.id===editId?Object.assign({},d,{id:editId}):p));
    else setParts(parts.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveVQ = () => {
    if (!vqForm.vendorId || !vqForm.cost) return showToast("Vendor and cost required","err");
    const d = Object.assign({}, vqForm, {cost:parseFloat(vqForm.cost)||0, leadDays:parseInt(vqForm.leadDays)||0, qty:parseInt(vqForm.qty)||1});
    if (modal==="editVQ") setVendorQuotes(vendorQuotes.map(q=>q.id===editId?Object.assign({},d,{id:editId}):q));
    else setVendorQuotes(vendorQuotes.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveCP = () => {
    if (!cpForm.customerId || !cpForm.sellPrice) return showToast("Customer and price required","err");
    const d = Object.assign({}, cpForm, {sellPrice:parseFloat(cpForm.sellPrice)||0});
    if (modal==="editCP") setCustomerPricing(customerPricing.map(c=>c.id===editId?Object.assign({},d,{id:editId}):c));
    else setCustomerPricing(customerPricing.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveOrd = () => {
    if (!ordForm.customerId || !ordForm.partId) return showToast("Customer and part required","err");
    const d = Object.assign({}, ordForm, {qty:parseInt(ordForm.qty)||1, unitPrice:parseFloat(ordForm.unitPrice)||0, vendorCost:parseFloat(ordForm.vendorCost)||0, repairCost:parseFloat(ordForm.repairCost)||0});
    if (modal==="editOrd") {
      const prev = orders.find(o=>o.id===editId);
      if (prev && prev.status !== d.status) {
        setOrderEvents(orderEvents.concat([{id:uid(),orderId:editId,ts:new Date().toISOString(),type:"Status Change",author:"You",note:"Status: "+prev.status+" → "+d.status}]));
      }
      setOrders(orders.map(o=>o.id===editId?Object.assign({},d,{id:editId}):o));
    } else {
      const newId = uid();
      const newOrd = Object.assign({},d,{id:newId, orderNum:ordForm.orderNum||nextOrderNum(orders)});
      setOrders(orders.concat([newOrd]));
      setOrderEvents(orderEvents.concat([{id:uid(),orderId:newId,ts:new Date().toISOString(),type:"Quote Sent",author:"You",note:"Order created — status: "+d.status}]));
    }
    setModal(null); showToast("Saved.");
  };
  const saveEvt = () => {
    if (!evtForm.type || !evtForm.note || !evtForm.note.trim()) return showToast("Type and note required","err");
    setOrderEvents(orderEvents.concat([{id:uid(), orderId:selId, ts:new Date().toISOString(), type:evtForm.type, author:evtForm.author||"You", note:evtForm.note}]));
    setModal(null); showToast("Event logged.");
  };
  const doDelete = () => {
    if (!delTarget) return;
    const {type,id} = delTarget;
    if (type==="cust") { setCustomers(customers.filter(c=>c.id!==id)); setCustomerPricing(customerPricing.filter(p=>p.customerId!==id)); }
    if (type==="ven") { setVendors(vendors.filter(v=>v.id!==id)); setVendorQuotes(vendorQuotes.filter(q=>q.vendorId!==id)); }
    if (type==="part") { setParts(parts.filter(p=>p.id!==id)); setVendorQuotes(vendorQuotes.filter(q=>q.partId!==id)); setCustomerPricing(customerPricing.filter(c=>c.partId!==id)); }
    if (type==="vq") setVendorQuotes(vendorQuotes.filter(q=>q.id!==id));
    if (type==="cp") setCustomerPricing(customerPricing.filter(c=>c.id!==id));
    if (type==="ord") { setOrders(orders.filter(o=>o.id!==id)); setOrderEvents(orderEvents.filter(e=>e.orderId!==id)); if (view==="orderDetail") setView("orders"); }
    if (type==="evt") setOrderEvents(orderEvents.filter(e=>e.id!==id));
    setModal(null); setDelTarget(null); showToast("Deleted.");
  };
  const openM = (type, data) => {
    data = data || null;
    if (type==="addCust") setCustForm({code:"",name:"",contact:"",email:"",phone:"",billing:"",terms:"Net 30",status:"Active",notes:""});
    if (type==="editCust") setCustForm(Object.assign({},data));
    if (type==="addVen") setVenForm({code:"",name:"",contact:"",email:"",phone:"",notes:""});
    if (type==="editVen") setVenForm(Object.assign({},data));
    if (type==="addPart") setPartForm({pn:"",desc:"",category:"Hydraulics",uom:"EA",notes:""});
    if (type==="editPart") setPartForm(Object.assign({},data));
    if (type==="addVQ") setVqForm({partId:(data&&data.partId)||selId,vendorId:"",cost:"",leadDays:"",quoteDate:today(),expires:"",qty:1,notes:"",source:"Email quote"});
    if (type==="editVQ") setVqForm(Object.assign({},data,{cost:String(data.cost),leadDays:String(data.leadDays||""),qty:String(data.qty||1)}));
    if (type==="addCP") setCpForm({partId:(data&&data.partId)||selId,customerId:"",sellPrice:"",notes:""});
    if (type==="editCP") setCpForm(Object.assign({},data,{sellPrice:String(data.sellPrice)}));
    if (type==="addOrd") setOrdForm({orderNum:"",customerId:"",partId:"",qty:1,unitPrice:"",vendorId:"",vendorCost:"",repairCost:"",status:"Quoted",priority:"Normal",custPO:"",dateQuoted:today(),datePO:"",dateVendor:"",dateShip:"",notes:""});
    if (type==="editOrd") setOrdForm(Object.assign({},data,{qty:String(data.qty),unitPrice:String(data.unitPrice),vendorCost:String(data.vendorCost),repairCost:String(data.repairCost)}));
    if (type==="addEvt") setEvtForm({type:"Note",author:"You",note:""});
    setEditId(data ? data.id : null);
    setModal(type);
  };
  const askDel = (type,id,label) => { setDelTarget({type,id,label}); setModal("del"); };

  const exportXLSX = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(customers), "Customers");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(vendors), "Vendors");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(parts.map(p=>({"Part Number":p.pn,Description:p.desc,Category:p.category,UOM:p.uom,Notes:p.notes}))), "Parts");

            <Row><FF label="Vendor Cost" half><input type="number" step="0.01" style={S.inp} value={ordForm.vendorCost||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{vendorCost:e.target.value}))} /></FF><FF label="Repair Cost" half><input type="number" step="0.01" style={S.inp} value={ordForm.repairCost||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{repairCost:e.target.value}))} /></FF></Row>
            <Row><FF label="Priority" half><select style={S.sel} value={ordForm.priority||"Normal"} onChange={e=>setOrdForm(Object.assign({},ordForm,{priority:e.target.value}))}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></FF><FF label="Date Quoted" half><input type="date" style={S.inp} value={ordForm.dateQuoted||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{dateQuoted:e.target.value}))} /></FF></Row>
            <Row><FF label="Date PO" half><input type="date" style={S.inp} value={ordForm.datePO||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{datePO:e.target.value}))} /></FF><FF label="Date Vendor" half><input type="date" style={S.inp} value={ordForm.dateVendor||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{dateVendor:e.target.value}))} /></FF></Row>
            <FF label="Expected Ship"><input type="date" style={S.inp} value={ordForm.dateShip||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{dateShip:e.target.value}))} /></FF>
            <FF label="Notes"><textarea style={Object.assign({},S.inp,{height:60,resize:"vertical"})} value={ordForm.notes||""} onChange={e=>setOrdForm(Object.assign({},ordForm,{notes:e.target.value}))} /></FF>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnP} onClick={saveOrd}>Save</button></div>
          </div>
        </div>
      )}

      {modal==="addEvt" && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={Object.assign({},S.modal,{maxWidth:440})} className="modal-box fade" onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:15,fontWeight:700,color:"#f0f6fc",marginBottom:18}}>Log Event</h2>
            <Row><FF label="Type" half><select style={S.sel} value={evtForm.type||"Note"} onChange={e=>setEvtForm(Object.assign({},evtForm,{type:e.target.value}))}>{EVENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></FF><FF label="Author" half><input style={S.inp} value={evtForm.author||""} onChange={e=>setEvtForm(Object.assign({},evtForm,{author:e.target.value}))} /></FF></Row>
            <FF label="Note *"><textarea style={Object.assign({},S.inp,{height:80,resize:"vertical"})} value={evtForm.note||""} onChange={e=>setEvtForm(Object.assign({},evtForm,{note:e.target.value}))} /></FF>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnP} onClick={saveEvt}>Save</button></div>
          </div>
        </div>
      )}

      {modal==="del" && delTarget && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={Object.assign({},S.modal,{maxWidth:380})} className="modal-box fade" onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:15,fontWeight:700,color:"#f85149",marginBottom:10}}>Confirm Delete</h2>
            <p style={{color:"#8b949e",fontSize:12,marginBottom:14}}>Delete <strong style={{color:"#f0f6fc"}}>"{delTarget.label}"</strong>?</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnD} onClick={doDelete}>Delete</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
