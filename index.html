const LS = {
  get: (k, seed) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : seed; } catch { return seed; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

const ORDER_STATUSES = ["Quoted","PO Received","Sourcing","Awaiting Vendor","In Repair","Proforma Sent","Prepaid","Shipped","Invoiced","Closed","Cancelled"];
const STATUS_COLORS = { "Quoted":"#f59e0b","PO Received":"#8b5cf6","Sourcing":"#06b6d4","Awaiting Vendor":"#3b82f6","In Repair":"#ec4899","Proforma Sent":"#eab308","Prepaid":"#14b8a6","Shipped":"#10b981","Invoiced":"#22c55e","Closed":"#6b7280","Cancelled":"#ef4444" };
const PRIORITIES = ["Low","Normal","High","Urgent"];
const PRIORITY_COLORS = { Low:"#6b7280", Normal:"#3b82f6", High:"#f59e0b", Urgent:"#ef4444" };
const CUST_STATUS = ["Active","Inactive","Prospect"];
const CUST_COLORS = { Active:"#10b981", Inactive:"#6b7280", Prospect:"#f59e0b" };
const TERMS = ["Prepay","Net 15","Net 30","Net 45","Net 60","COD"];
const CATEGORIES = ["Hydraulics","Landing Gear","Fuel System","Avionics","Engine","Airframe","Electrical","Other"];
const EVENT_TYPES = ["Quote Sent","PO Received","Vendor Quote","Vendor Ordered","Part Received","Repair Started","Repair Complete","Proforma Sent","Payment Received","Shipped","Invoiced","Email","Note","Status Change"];

const STAGES = [
  { key:"Quote", label:"Quote", assignField:"assignQuote" },

  { key:"Repair", label:"Repair", assignField:"assignRepair" },
  { key:"Shipping", label:"Shipping", assignField:"assignShipping" },
];
const STAGE_BY_STATUS = { "Quoted":"Quote","PO Received":"Sourcing","Sourcing":"Sourcing","Awaiting Vendor":"Sourcing","In Repair":"Repair","Proforma Sent":"Shipping","Prepaid":"Shipping","Shipped":"Shipping","Invoiced":"Shipping","Closed":"Shipping","Cancelled":"Quote" };

const fmt$ = n => "$" + Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = d => d ? new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
const fmtTs = ts => new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
const today = () => new Date().toISOString().slice(0,10);
const isExpired = exp => exp && new Date(exp) < new Date();
let _id = 500; const uid = () => "x" + (_id++);
const nextOrderNum = (orders) => {
  const y = new Date().getFullYear();
  const nums = orders.filter(o => o.orderNum && o.orderNum.startsWith("OPS-"+y+"-")).map(o => parseInt(o.orderNum.split("-")[2])||0);
  const n = (nums.length ? Math.max.apply(null,nums) : 0) + 1;
  return "OPS-" + y + "-" + String(n).padStart(4,"0");
};
const nextProfileNum = (list, prefix) => {
  const nums = list.filter(x=>x.profileNum && x.profileNum.startsWith(prefix+"-")).map(x=>parseInt(x.profileNum.split("-")[1])||0);
  const n = (nums.length ? Math.max.apply(null, nums) : 0) + 1;
  return prefix + "-" + String(n).padStart(4,"0");
};

const S = {
  root: {fontFamily:"'DM Mono','Courier New',monospace",background:"#0d1117",minHeight:"100vh",color:"#e2e8f0"},

  btn: (bg,c,b) => ({background:bg||"#21262d",border:b||"1px solid #30363d",borderRadius:6,color:c||"#c9d1d9",padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6}),
  btnP: {background:"#1f6feb",border:"none",borderRadius:6,color:"#fff",padding:"8px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700,display:"inline-flex",alignItems:"center",gap:6},
  btnD: {background:"#da363322",border:"1px solid #da363344",borderRadius:6,color:"#f85149",padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6},

  inp: {background:"#0d1117",border:"1px solid #30363d",borderRadius:6,color:"#e2e8f0",padding:"8px 12px",fontSize:12,fontFamily:"inherit",width:"100%",outline:"none"},
  sel: {background:"#0d1117",border:"1px solid #30363d",borderRadius:6,color:"#e2e8f0",padding:"8px 12px",fontSize:12,fontFamily:"inherit",width:"100%",outline:"none"},
  overlay: {position:"fixed",inset:0,background:"#000000cc",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20},

  chip: (a,c) => ({padding:"4px 12px",cursor:"pointer",fontSize:11,fontWeight:700,background:a?(c||"#1f6feb"):"#21262d",border:"1px solid "+(a?(c||"#1f6feb"):"#30363d"),borderRadius:20,color:a?"#fff":"#8b949e",fontFamily:"inherit",whiteSpace:"nowrap"}),
  navTab: (a) => ({padding:"12px 18px",cursor:"pointer",fontSize:12,fontWeight:700,color:a?"#58a6ff":"#8b949e",borderBottom:a?"2px solid #58a6ff":"2px solid transparent",whiteSpace:"nowrap",background:"none",border:"none",fontFamily:"inherit",borderBottomWidth:"2px"}),
};

const Badge = ({label,colors}) => { const c = colors[label]||"#6b7280"; return <span style={{background:c+"22",color:c,border:"1px solid "+c+"44",borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:.5,whiteSpace:"nowrap"}}>{label}</span>; };
const FF = ({label,children,half}) => <div style={{marginBottom:12,width:half?"calc(50% - 6px)":"100%"}}><div style={S.lbl}>{label}</div>{children}</div>;
const Row = ({children}) => <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{children}</div>;

function App() {
  const [customers, setCustomers] = useState(() => LS.get("op_cus", SEED.customers));
  const [vendors, setVendors] = useState(() => LS.get("op_ven", SEED.vendors));
  const [parts, setParts] = useState(() => LS.get("op_prt", SEED.parts));
  const [vendorQuotes, setVendorQuotes] = useState(() => LS.get("op_vq", SEED.vendorQuotes));
  const [customerPricing, setCustomerPricing] = useState(() => LS.get("op_cp", SEED.customerPricing));
  const [orders, setOrders] = useState(() => LS.get("op_ord", SEED.orders));
  const [orderEvents, setOrderEvents] = useState(() => LS.get("op_ev", SEED.orderEvents));
  const [employees, setEmployees] = useState(() => LS.get("op_emp", SEED.employees));
  const [currentUser, setCurrentUser] = useState(() => LS.get("op_user", "Tatiana"));

  useEffect(() => LS.set("op_cus", customers), [customers]);
  useEffect(() => LS.set("op_ven", vendors), [vendors]);
  useEffect(() => LS.set("op_prt", parts), [parts]);
  useEffect(() => LS.set("op_vq", vendorQuotes), [vendorQuotes]);
  useEffect(() => LS.set("op_cp", customerPricing), [customerPricing]);
  useEffect(() => LS.set("op_ord", orders), [orders]);
  useEffect(() => LS.set("op_ev", orderEvents), [orderEvents]);
  useEffect(() => LS.set("op_emp", employees), [employees]);
  useEffect(() => LS.set("op_user", currentUser), [currentUser]);

  const [view, setView] = useState("dashboard");
  const [selId, setSelId] = useState(null);
  const [modal, setModal] = useState(null);
  const [editId, setEditId] = useState(null);
  const [delTarget, setDelTarget] = useState(null);
  const [toast, setToast] = useState(null);
  const [orderSearch, setOrderSearch] = useState("");
  const [orderStatusFilter, setOrderStatusFilter] = useState("All");
  const [partSearch, setPartSearch] = useState("");
  const [custSearch, setCustSearch] = useState("");
  const [venSearch, setVenSearch] = useState("");

  const [custForm, setCustForm] = useState({});
  const [venForm, setVenForm] = useState({});
  const [partForm, setPartForm] = useState({});
  const [vqForm, setVqForm] = useState({});
  const [cpForm, setCpForm] = useState({});
  const [ordForm, setOrdForm] = useState({});
  const [evtForm, setEvtForm] = useState({});
  const [empForm, setEmpForm] = useState({});
  const [contactForm, setContactForm] = useState({});
  const [contactTarget, setContactTarget] = useState(null);
  const [evtDocs, setEvtDocs] = useState([]);
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef(null);

  const showToast = (msg, type) => { setToast({msg,type:type||"ok"}); setTimeout(()=>setToast(null), 2600); };
  const getCust = id => customers.find(c=>c.id===id);
  const getVen = id => vendors.find(v=>v.id===id);
  const getPart = id => parts.find(p=>p.id===id);
  const getEmp = id => employees.find(e=>e.id===id);
  const vqForPart = pid => vendorQuotes.filter(q=>q.partId===pid).sort((a,b)=>a.cost-b.cost);
  const cpForPart = pid => customerPricing.filter(c=>c.partId===pid);
  const eventsForOrder = oid => orderEvents.filter(e=>e.orderId===oid).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const primaryContact = obj => (obj?.contacts||[]).find(c=>c.primary) || (obj?.contacts||[])[0];

  const saveCust = () => {
    if (!custForm.name || !custForm.name.trim()) return showToast("Name required","err");
    const d = Object.assign({}, custForm);
    if (d.code) d.code = d.code.toUpperCase();
    if (!d.contacts) d.contacts = [];
    if (modal==="editCust") setCustomers(customers.map(c=>c.id===editId?Object.assign({},d,{id:editId}):c));
    else { d.profileNum = nextProfileNum(customers, "CUS"); setCustomers(customers.concat([Object.assign({},d,{id:uid()})])); }
    setModal(null); showToast("Saved.");
  };
  const saveVen = () => {
    if (!venForm.name || !venForm.name.trim()) return showToast("Name required","err");
    const d = Object.assign({}, venForm);
    if (d.code) d.code = d.code.toUpperCase();
    if (!d.contacts) d.contacts = [];
    if (modal==="editVen") setVendors(vendors.map(v=>v.id===editId?Object.assign({},d,{id:editId}):v));
    else { d.profileNum = nextProfileNum(vendors, "VEN"); setVendors(vendors.concat([Object.assign({},d,{id:uid()})])); }
    setModal(null); showToast("Saved.");
  };
  const savePart = () => {
    if (!partForm.pn || !partForm.pn.trim()) return showToast("Part number required","err");
    const d = Object.assign({}, partForm, {pn: partForm.pn.toUpperCase().trim()});
    if (modal==="editPart") setParts(parts.map(p=>p.id===editId?Object.assign({},d,{id:editId}):p));
    else setParts(parts.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveVQ = () => {
    if (!vqForm.vendorId || !vqForm.cost) return showToast("Vendor and cost required","err");
    const d = Object.assign({}, vqForm, {cost:parseFloat(vqForm.cost)||0, leadDays:parseInt(vqForm.leadDays)||0, qty:parseInt(vqForm.qty)||1});
    if (modal==="editVQ") setVendorQuotes(vendorQuotes.map(q=>q.id===editId?Object.assign({},d,{id:editId}):q));
    else setVendorQuotes(vendorQuotes.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveCP = () => {
    if (!cpForm.customerId || !cpForm.sellPrice) return showToast("Customer and price required","err");
    const d = Object.assign({}, cpForm, {sellPrice:parseFloat(cpForm.sellPrice)||0});
    if (modal==="editCP") setCustomerPricing(customerPricing.map(c=>c.id===editId?Object.assign({},d,{id:editId}):c));
    else setCustomerPricing(customerPricing.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveOrd = () => {
    if (!ordForm.customerId) return showToast("Customer required","err");
    // Handle part — if partNumRaw typed and no existing match, create a part
    let partId = ordForm.partId;
    const rawPN = (ordForm.partNumRaw||"").trim().toUpperCase();
    if (rawPN && !partId) {
      const existing = parts.find(p => p.pn.toUpperCase() === rawPN);
      if (existing) partId = existing.id;
      else {
        const newPart = {id:uid(), pn:rawPN, desc:"", category:"Other", uom:"EA", notes:""};
        setParts(parts.concat([newPart]));
        partId = newPart.id;
      }
    }
    const d = Object.assign({}, ordForm, {
      partId: partId||"",
      qty:parseInt(ordForm.qty)||1,
      unitPrice:parseFloat(ordForm.unitPrice)||0,
      vendorCost:parseFloat(ordForm.vendorCost)||0,
      repairCost:parseFloat(ordForm.repairCost)||0,
    });
    if (modal==="editOrd") {
      const prev = orders.find(o=>o.id===editId);
      if (prev && prev.status !== d.status) {
        setOrderEvents(orderEvents.concat([{id:uid(),orderId:editId,ts:new Date().toISOString(),type:"Status Change",author:currentUser,note:"Status: "+prev.status+" → "+d.status,docs:[]}]));
      }
      setOrders(orders.map(o=>o.id===editId?Object.assign({},d,{id:editId}):o));
    } else {
      const newId = uid();
      const newOrd = Object.assign({},d,{id:newId, orderNum:ordForm.orderNum||nextOrderNum(orders)});
      setOrders(orders.concat([newOrd]));
      setOrderEvents(orderEvents.concat([{id:uid(),orderId:newId,ts:new Date().toISOString(),type:"Quote Sent",author:currentUser,note:"Order created — status: "+d.status,docs:[]}]));
    }
    setModal(null); showToast("Saved.");
  };
  const saveEvt = () => {
    if (!evtForm.type || !evtForm.note || !evtForm.note.trim()) return showToast("Type and note required","err");
    setOrderEvents(orderEvents.concat([{id:uid(), orderId:selId, ts:new Date().toISOString(), type:evtForm.type, author:evtForm.author||currentUser, note:evtForm.note, docs:evtDocs}]));
    setEvtDocs([]);
    setModal(null); showToast("Event logged.");
  };
  const saveEmp = () => {
    if (!empForm.name || !empForm.name.trim()) return showToast("Name required","err");
    const d = Object.assign({active:true}, empForm);
    if (modal==="editEmp") setEmployees(employees.map(e=>e.id===editId?Object.assign({},d,{id:editId}):e));
    else setEmployees(employees.concat([Object.assign({},d,{id:uid()})]));
    setModal(null); showToast("Saved.");
  };
  const saveContact = () => {
    if (!contactForm.name || !contactForm.name.trim()) return showToast("Contact name required","err");
    const {kind, parentId, contactId} = contactTarget;
    const list = kind==="cust" ? customers : vendors;
    const setList = kind==="cust" ? setCustomers : setVendors;
    const parent = list.find(x=>x.id===parentId);
    if (!parent) return;
    let contacts = (parent.contacts||[]).slice();
    if (contactForm.primary) contacts = contacts.map(c=>({...c, primary:false}));
    if (contactId) contacts = contacts.map(c=>c.id===contactId ? Object.assign({},contactForm,{id:contactId}) : c);
    else contacts = contacts.concat([Object.assign({},contactForm,{id:uid()})]);
    setList(list.map(x=>x.id===parentId ? Object.assign({},x,{contacts}) : x));
    setModal(null); showToast("Contact saved.");
  };
  const deleteContact = (kind, parentId, contactId) => {
    const list = kind==="cust" ? customers : vendors;
    const setList = kind==="cust" ? setCustomers : setVendors;

    return (
      <div style={{display:"inline-flex",alignItems:"center",gap:6,background:isCurrent?"#1f6feb22":"#21262d",border:`1px solid ${isCurrent?"#1f6feb66":"#30363d"}`,borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={()=>{
        const names = employees.filter(e=>e.active).map(e=>e.name);
        const opts = ["(none)"].concat(employees.filter(e=>e.active).map(e=>e.name));
        const choice = prompt(stage.label+" — assign to (type exactly):\n\n"+opts.join("\n")+"\n\nCurrent: "+(emp?emp.name:"none"));
        if (choice===null) return;
        if (choice==="(none)"||choice==="") { assignToStage(order, stage.assignField, ""); return; }
        const found = employees.find(e=>e.name.toLowerCase()===choice.toLowerCase());
        if (!found) { showToast("No employee by that name","err"); return; }
        assignToStage(order, stage.assignField, found.id);
      }}>

                <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)} />
              </div>
              {evtDocs.length>0 && <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{evtDocs.map((d,i)=><div key={i} style={{background:"#21262d",borderRadius:4,padding:"3px 8px",fontSize:11,color:"#c9d1d9",display:"flex",gap:4,alignItems:"center"}}>📎 {d.name} <span style={{cursor:"pointer",color:"#8b949e",marginLeft:2}} onClick={()=>setEvtDocs(evtDocs.filter((_,j)=>j!==i))}>✕</span></div>)}</div>}
            </FF>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnP} onClick={saveEvt}>Save</button></div>
          </div>
        </div>
      )}

      {(modal==="addEmp"||modal==="editEmp") && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={S.modal} className="fade" onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:15,fontWeight:700,color:"#f0f6fc",marginBottom:18}}>{modal==="editEmp"?"Edit Team Member":"New Team Member"}</h2>
            <FF label="Name *"><input style={S.inp} value={empForm.name||""} onChange={e=>setEmpForm(Object.assign({},empForm,{name:e.target.value}))} /></FF>
            <FF label="Role / Title"><input style={S.inp} value={empForm.role||""} onChange={e=>setEmpForm(Object.assign({},empForm,{role:e.target.value}))} placeholder="Account Manager, Repair Tech, Shipping, etc." /></FF>
            <Row><FF label="Email" half><input style={S.inp} value={empForm.email||""} onChange={e=>setEmpForm(Object.assign({},empForm,{email:e.target.value}))} /></FF><FF label="Phone" half><input style={S.inp} value={empForm.phone||""} onChange={e=>setEmpForm(Object.assign({},empForm,{phone:e.target.value}))} /></FF></Row>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer"}}><input type="checkbox" checked={empForm.active!==false} onChange={e=>setEmpForm(Object.assign({},empForm,{active:e.target.checked}))} /><span style={{fontSize:12,color:"#c9d1d9"}}>Active (can be assigned to orders)</span></label>
            <FF label="Notes"><textarea style={Object.assign({},S.inp,{height:60,resize:"vertical"})} value={empForm.notes||""} onChange={e=>setEmpForm(Object.assign({},empForm,{notes:e.target.value}))} /></FF>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnP} onClick={saveEmp}>Save</button></div>
          </div>
        </div>
      )}

      {modal==="del" && delTarget && (
        <div style={S.overlay} onClick={()=>setModal(null)}>
          <div style={Object.assign({},S.modal,{maxWidth:380})} className="fade" onClick={e=>e.stopPropagation()}>
            <h2 style={{fontSize:15,fontWeight:700,color:"#f85149",marginBottom:10}}>Confirm Delete</h2>
            <p style={{color:"#8b949e",fontSize:12,marginBottom:14}}>Delete <strong style={{color:"#f0f6fc"}}>"{delTarget.label}"</strong>?</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}><button style={S.btn()} onClick={()=>setModal(null)}>Cancel</button><button style={S.btnD} onClick={doDelete}>Delete</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
